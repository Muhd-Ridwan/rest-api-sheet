services:
  db:
    image: postgres:15
    container_name: rest-api-sheet-db
    restart: always
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5431:5432"

  backend:
    image: ridwan432/rest-api-sheet:latest
    container_name: rest-api-sheet
    restart: always
    ports:
      - "8001:8000"
    env_file:
      - ./.env
    depends_on:
      - db

volumes:
  postgres_data:
