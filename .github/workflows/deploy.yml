name: Build and deploy - rest api sheet

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "db/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ridwan432/rest-api-sheet:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$VPS_SSH_KEY" > /tmp/vps_key
          chmod 600 /tmp/vps_key

          ssh -o StrictHostKeyChecking=no -i /tmp/vps_key "$VPS_USER@$VPS_HOST" bash << 'EOF'
            set -e

            echo "--- Pulling latest code ---"
            cd /home/rwpnt/rest-api-sheet
            git pull origin main

            echo "--- Pulling latest image ---"
            docker compose pull

            echo "--- Restarting containers ---"
            docker compose up -d

            echo "--- Verifying containers are running ---"
            sleep 5
            if [ "$(docker inspect -f '{{.State.Running}}' rest-api-sheet)" = "true" ]; then
              echo "Container is running successfully."
            else
              echo "ERROR: Container failed to start!"
              docker logs rest-api-sheet
              exit 1
            fi
            echo "Deploy completed successfully."
          EOF

          rm -f /tmp/vps_key
